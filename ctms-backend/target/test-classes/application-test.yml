spring:
  datasource:
    # In-memory H2 in PostgreSQL-compatibility mode for fast, isolated tests.
    url: jdbc:h2:mem:ctms;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      # Tests build the schema from the JPA entities themselves.
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: false

ctms:
  security:
    enabled: false
    system-user-id: 1

logging:
  level:
    com.ctms: INFO
